   .contact-form {
    background: rgb(227,165,199);
    background: linear-gradient(90deg, rgba(227,165,199,1) 0%, rgba(182,146,194,1) 49%);
    color: white;
    border-radius: 20px;
    margin: 80px;
    height: 100vh;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
   }

   .contact-left {
    display: flex;
    flex-direction: column;
    align-items: center;
   }

   .contact-right {
    margin: 80px;
   }

   input[type="text"], #message {
    margin: 20px;
    padding: 10px;
    width: 400px;
    border-radius: 20px;
    border: none;
   }

   #contact-button {
    background-color: white;
    color: black;
    border: none;
    border-radius: 10px;
    font-size: 1.5rem;
    margin-top: 30px;
    padding: 10px 30px 10px 30px;
   }

   #contact-button:hover {
    background-color: lightgray;
   }

   #contact-button:focus {
    background-color: #FFDFD6;
   }

   @media (max-width: 949px) {
    .contact-form {
      margin: 20px;
      margin-bottom: 80px;
    }
   }

   @media (max-width: 790px) {
    .contact-form {
      display: block;
      height: 100%;
      padding: 20px;
    }

    .contact-right {
      text-align: center;
      padding: 20px;
      margin: 100px 20px 50px 20px;
      border: double #694F8E 10px;
    }
   }

   @media (max-width: 460px) {
    .full-background {
      background: rgb(227,165,199);
      background: linear-gradient(90deg, rgba(227,165,199,1) 0%, rgba(182,146,194,1) 49%);
    }

    .contact-form {
      margin: 0px;
      padding-top: 50px;
    }

    input[type="text"], #message {
    width: 300px;
   }

   .contact-right {
     margin-right: 0px;
     margin-left: 0px;
   }

  #contact-button {
    font-size: 1rem;
  }
   }
